#cloud-config

package_update: true

packages:
    - ufw
    - fail2ban
    - libpam-google-authenticator

write_files:
  - path: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = ssh
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 5
      bantime = 1h

runcmd:
    - ufw allow OpenSSH
    - ufw allow 80
    - ufw allow 443
    - ufw --force enable
    - mkdir -p /opt/app
    # Allow Go app to bind to privileged ports (80, 443)
    - setcap 'cap_net_bind_service=+ep' /opt/app/helloworld
    # Set root password
    - echo "root:${root_password}" | chpasswd
    # Enable password authentication in SSH (as requested)
    - sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
    # Configure PAM for MFA (MFA requirement)
    # Note: Full MFA setup usually requires interactive 'google-authenticator' run per user.
    # We prepare the system for it.
    - sed -i 's/ChallengeResponseAuthentication no/ChallengeResponseAuthentication yes/' /etc/ssh/sshd_config
    - echo "auth required pam_google_authenticator.so nullok" >> /etc/pam.d/sshd
    - systemctl restart ssh
    - systemctl enable fail2ban
    - systemctl restart fail2ban